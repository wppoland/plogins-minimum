name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  ci:
    uses: wppoland/workflows/.github/workflows/_php-ci.yml@v1
    with:
      slug: minimum
      has-js: true
      run-i18n: false
      run-playwright: false
      # Plugin Check = wp.org submission gate.
      run-plugin-check: true
